<ng-container *ngIf="router.url !== '/lista'"> 
  <!-- Solo muestra el formulario si NO estamos en la ruta '/lista' -->
  <form [formGroup]="miFormulario" class="form-contenedor"> 
    <!-- Contenedor para el formulario con clase para estilos -->
    <h2>Formulario de Estudiantes</h2>
    <hr class="separador">
    <h3>Estudiantes</h3>
    <!-- Nombre completo del Alumno -->
    <div formArrayName="items">
      <!-- Contenedor para el FormArray de productos -->
     <!-- Usamos *ngFor para iterar sobre los controles del FormArray -->
      <!-- Cada producto se muestra en una fila con campos para 
       nombre y cantidad, y un botón para eliminar -->
       <!-- Agregamos una clase 'item-fila' para estilos -->
      <div *ngFor="let item of listaItems.controls; let i = index" 
         [formGroupName]="i"]
          class="row g-2 align-items-center mb-3 border p-3 rounded item-fila">
           <!-- Fila para cada producto con clase para estilos -->
        <!-- Campos para el nombre del producto y la cantidad, 
         con clases para estilos -->
        <div class="col-md-2">
          <!-- Campo para la matricula con clase para estilos -->
         <input type="number" class="form-control" placeholder="Matricula" ></div>
          <!-- Campo para el nombre del alumno con clase para estilos -->
        <input formControlName="Alumno" placeholder="Nombre del Alumno" class="input-Alumno">
          <!-- Campo para la cantidad del producto con clase para estilos -->
        <input formControlName="Apellidos" placeholder="Apellidos" class="input-Apellidos">
          <!-- Campo para la carrera con clase para estilos -->
        <input formControlName="Carrera" placeholder="Carrera" class="input-Carrera">
         <!-- Campo para la cantidad del producto con clase para estilos -->
        <input type="date" formControlName="FechaNacimiento" placeholder="Fecha de Nacimiento" class="input-FechaNacimiento">
          <!-- Campo para la fecha de nacimiento con clase para estilos -->
        <input formControlName="Genero" placeholder="Genero" class="input-Genero">
          <!-- Campo para el genero con clase para estilos -->
        <input type="number" formControlName="Cuatrimestre" placeholder="Cuatrimestre" class="input-Cuatrimestre">
          <!-- Campo para el cuatrimestre con clase para estilos -->
        
          <!-- Fila para cada producto con clases para estilos -->
        <input formControlName="Grupo" placeholder="Grupo" class="input-Grupo">
          <!-- Campo para el grupo con clase para estilos -->
        <input formControlName="Acciones" placeholder="Acciones" class="input-Acciones">
          <!-- Campo para las acciones con clase para estilos -->
         
         <!-- Aquí se muestra un ejemplo básico de cómo podrían verse los botones, pero puedes ajustarlos según tus necesidades y estilo de tu aplicación -->
        <button type="button" (click)="eliminarItem(i)" class="btn-eliminar">
          &times; Eliminar
        </button>
        <button type="button" (click)="editarItem(i)" class="btn-editar">
          <!-- Botón para editar el producto, con clase para estilos -->
        </button>
      </div>
    </div>
    <div class="acciones-finales">
      <!-- Botón para agregar un nuevo producto, con clase para estilos -->
      <button type="button" (click)="agregarItem()" class="btn-agregar">
        + Agregar Alumno
        <!-- Botón para agregar un nuevo alumno, con clase para estilos -->
      </button>
      <br><br>
      <!-- Botón para ver la tabla, con clase para estilos -->
      <button type="button" (click)="verEnOtraPagina()" class="button btn-ver-tabla">
        Ver en Tabla
      </button>   
    </div>
  </form>
</ng-container>
<!-- El <router-outlet> se mantiene 
  fuera del ng-container para que siempre esté presente, 
  pero solo cargará contenido cuando estemos en la ruta '/lista' -->
<router-outlet></router-outlet>
